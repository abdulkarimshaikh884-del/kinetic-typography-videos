<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@600;700;800;900&family=Archivo+Black&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1280px; height: 720px; overflow: hidden; }

  .stage {
    position: relative;
    width: 1280px;
    height: 720px;
    background:
      radial-gradient(900px 600px at 78% 60%, rgba(124, 58, 237, 0.45), transparent 60%),
      radial-gradient(800px 500px at 8% 30%, rgba(16, 185, 129, 0.40), transparent 60%),
      radial-gradient(700px 600px at 50% 120%, rgba(6, 182, 212, 0.25), transparent 60%),
      linear-gradient(135deg, #070b16 0%, #0a1224 45%, #0c0f1f 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }

  /* tech grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(120,160,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,160,255,0.06) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(circle at 50% 45%, black 30%, transparent 85%);
  }

  /* soft floating glow orbs */
  .orb { position:absolute; border-radius:50%; filter: blur(60px); opacity:.55; }
  .orb1 { width:360px; height:360px; left:-90px; top:160px; background:#10b981; }
  .orb2 { width:420px; height:420px; right:-120px; top:-60px; background:#7c3aed; }
  .orb3 { width:300px; height:300px; right:380px; bottom:-120px; background:#06b6d4; opacity:.4;}

  .vignette {
    position:absolute; inset:0;
    box-shadow: inset 0 0 220px 60px rgba(0,0,0,0.72);
    pointer-events:none;
  }

  /* outer accent frame */
  .frame {
    position:absolute; inset:14px;
    border:3px solid rgba(57,255,136,0.55);
    border-radius:18px;
    box-shadow: 0 0 28px rgba(57,255,136,0.35), inset 0 0 24px rgba(57,255,136,0.12);
    pointer-events:none;
  }

  /* ---- TOP RIGHT 2026 BADGE ---- */
  .badge2026 {
    position:absolute; top:30px; right:34px;
    background: linear-gradient(180deg,#ffe14d,#f4b400);
    color:#10131c;
    font-family:'Anton',sans-serif;
    font-size:40px; letter-spacing:2px;
    padding:6px 20px 4px; border-radius:12px;
    transform: rotate(4deg);
    box-shadow: 0 6px 0 #a87900, 0 12px 22px rgba(0,0,0,.5);
    border:2px solid #fff6c2;
  }

  /* ---- TOP LEFT FULL VIDEO / PART 2 RIBBON ---- */
  .ribbon {
    position:absolute; top:28px; left:30px;
    display:flex; align-items:center; gap:10px;
  }
  .ribbon .part {
    background: linear-gradient(180deg,#ff4d4d,#d61010);
    color:#fff; font-family:'Anton',sans-serif; font-size:30px;
    padding:8px 18px 5px; border-radius:10px; letter-spacing:1px;
    box-shadow:0 5px 0 #7d0606, 0 10px 20px rgba(0,0,0,.45);
    border:2px solid #ff9a9a;
  }
  .ribbon .full {
    background: rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.35);
    color:#eaf2ff; font-weight:800; font-size:17px;
    padding:9px 14px; border-radius:10px; letter-spacing:2px;
    backdrop-filter: blur(4px);
  }

  /* ---- MAIN TEXT BLOCK ---- */
  .content {
    position:absolute; left:56px; top:128px; width:760px;
  }
  .kicker {
    display:inline-flex; align-items:center; gap:9px;
    color:#9ffbcb; font-weight:800; font-size:18px; letter-spacing:3px;
    background:rgba(16,185,129,0.12);
    border:1.5px solid rgba(57,255,136,0.4);
    padding:7px 16px; border-radius:30px; margin-bottom:14px;
    text-transform:uppercase;
  }
  .kicker .dot { width:9px;height:9px;border-radius:50%;background:#39ff88; box-shadow:0 0 10px #39ff88;}

  .h-claude {
    font-family:'Archivo Black', sans-serif;
    color:#ffffff; font-size:74px; line-height:.92; letter-spacing:1px;
    text-shadow: 0 0 22px rgba(120,180,255,0.55), 0 4px 0 rgba(0,0,0,0.35);
  }
  .h-claude .pro { color:#7bdcff; }

  .h-free {
    font-family:'Anton', sans-serif;
    font-size:178px; line-height:.8; letter-spacing:2px;
    margin-top:6px;
    background: linear-gradient(180deg,#eaff00 0%, #6dff3d 55%, #18c93f 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    -webkit-text-stroke: 5px #06210d;
    filter: drop-shadow(0 10px 0 rgba(0,0,0,.45)) drop-shadow(0 0 34px rgba(109,255,61,0.6));
    display:inline-block; transform: rotate(-2deg);
  }
  .h-free .bang { -webkit-text-stroke: 5px #06210d; }

  /* price strike */
  .price {
    position:absolute; left:600px; top:300px;
    transform: rotate(-8deg); text-align:center;
  }
  .price .was {
    position:relative; display:inline-block;
    font-family:'Anton',sans-serif; color:#ff5b5b; font-size:46px;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .price .was::after{
    content:""; position:absolute; left:-8px; right:-8px; top:52%; height:6px;
    background:#ff2d2d; transform:rotate(-10deg); border-radius:4px;
    box-shadow:0 0 10px rgba(255,45,45,.8);
  }
  .price .sub { color:#cfe0ff; font-weight:800; font-size:18px; letter-spacing:1px; margin-top:2px;}

  /* ---- LOGO LOCKUP CARD ---- */
  .lockup {
    position:absolute; right:40px; top:250px;
    width:430px;
    background: linear-gradient(160deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
    border:1.5px solid rgba(255,255,255,0.22);
    border-radius:22px; padding:26px 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.18);
    backdrop-filter: blur(6px);
  }
  .lockrow { display:flex; align-items:center; justify-content:center; gap:20px; }
  .logobox { display:flex; flex-direction:column; align-items:center; gap:10px; flex:1;}
  .logobox .label { color:#eef4ff; font-weight:800; font-size:16px; letter-spacing:.5px; text-align:center;}
  .logobox .sub2 { color:#9fb2d4; font-weight:700; font-size:12px; margin-top:-6px;}
  .plus {
    font-family:'Anton',sans-serif; color:#39ff88; font-size:46px;
    text-shadow:0 0 16px rgba(57,255,136,.7);
  }
  .gh svg { width:74px; height:74px; filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .claude-mark {
    width:74px; height:74px; position:relative;
    filter: drop-shadow(0 4px 14px rgba(217,119,87,.55));
  }
  .gift {
    margin-top:18px; display:flex; align-items:center; justify-content:center; gap:10px;
    background: linear-gradient(180deg,#1b2a4a,#142038);
    border:1.5px solid rgba(123,220,255,0.4);
    border-radius:12px; padding:12px;
    color:#cfeaff; font-weight:800; font-size:16px; letter-spacing:.5px;
  }
  .gift b { color:#7bff9c; }

  /* arrow pointing to lockup */
  .arrow {
    position:absolute; left:512px; top:330px;
    font-family:'Anton',sans-serif; color:#39ff88; font-size:64px;
    transform: rotate(-8deg);
    text-shadow:0 0 18px rgba(57,255,136,.8);
  }

  /* ---- STEP BY STEP bottom badge ---- */
  .step {
    position:absolute; left:56px; bottom:34px;
    display:flex; align-items:center; gap:10px;
    background: linear-gradient(180deg,#10b981,#059669);
    color:#04130d; font-weight:900; font-size:22px; letter-spacing:1px;
    padding:10px 20px; border-radius:12px;
    box-shadow:0 6px 0 #035b41, 0 12px 22px rgba(0,0,0,.45);
    border:2px solid #7bffc4;
    text-transform:uppercase;
  }
  .step .ck { font-size:24px; }

  /* working method tag */
  .works {
    position:absolute; right:40px; bottom:34px;
    background: rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.3);
    color:#eaf2ff; font-weight:800; font-size:16px; letter-spacing:1px;
    padding:10px 18px; border-radius:30px; backdrop-filter:blur(4px);
  }
  .works b { color:#7bff9c; }

  /* channel handle */
  .handle {
    position:absolute; left:50%; transform:translateX(-50%); bottom:38px;
    color:#aebbd6; font-weight:800; font-size:15px; letter-spacing:3px;
    opacity:.9;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <!-- top badges -->
    <div class="ribbon">
      <div class="part">PART 2</div>
      <div class="full">FULL VIDEO &bull; A&ndash;Z</div>
    </div>
    <div class="badge2026">2026</div>

    <!-- main text -->
    <div class="content">
      <div class="kicker"><span class="dot"></span>100% Working Method</div>
      <div class="h-claude">GET CLAUDE AI <span class="pro">PRO</span></div>
      <div class="h-free">FREE<span class="bang">!</span></div>
    </div>

    <!-- crossed price -->
    <div class="price">
      <div class="was">$200/yr</div>
      <div class="sub">PAY NOTHING</div>
    </div>

    <div class="arrow">&#10142;</div>

    <!-- logo lockup -->
    <div class="lockup">
      <div class="lockrow">
        <div class="logobox gh">
          <svg viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <div class="label">GitHub</div>
          <div class="sub2">Student Pack</div>
        </div>

        <div class="plus">+</div>

        <div class="logobox">
          <div class="claude-mark">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <div class="label">Claude</div>
          <div class="sub2">PRO Plan</div>
        </div>
      </div>
      <div class="gift">&#127881; Unlock <b>Claude Pro</b> &mdash; for FREE</div>
    </div>

    <!-- bottom -->
    <div class="step"><span class="ck">&#10003;</span> Step&nbsp;by&nbsp;Step</div>
    <div class="works"><b>NO</b> Credit Card</div>
    <div class="handle">@TechVault&#8209;90</div>

    <div class="vignette"></div>
    <div class="frame"></div>
  </div>

  <script>
    // Draw the Claude (Anthropic) sunburst mark with JS for crisp tapered spokes
    (function () {
      var svg = document.querySelector('.claude-mark svg');
      var ns = 'http://www.w3.org/2000/svg';
      var cx = 50, cy = 50;
      var spokes = 12;
      var rInner = 6, rOuter = 46;
      for (var i = 0; i < spokes; i++) {
        var a = (Math.PI * 2 / spokes) * i - Math.PI / 2;
        var x1 = cx + Math.cos(a) * rInner;
        var y1 = cy + Math.sin(a) * rInner;
        var x2 = cx + Math.cos(a) * rOuter;
        var y2 = cy + Math.sin(a) * rOuter;
        var line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#D97757');
        line.setAttribute('stroke-width', '8.5');
        line.setAttribute('stroke-linecap', 'round');
        svg.appendChild(line);
      }
    })();
  </script>
</body>
</html>
